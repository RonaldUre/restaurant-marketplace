# === App ===
spring.application.name=restaurant-marketplace

# === Server ===
server.port=8080
# Para despliegues tipo Render/Heroku, el puerto suele venir por env:
# server.port=${PORT:8080}
server.forward-headers-strategy=framework

# === Datasource (MySQL 8) ===
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=sasa
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP (pool de conexiones)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# === JPA / Hibernate ===
# validamos, Flyway gestiona el schema
spring.jpa.hibernate.ddl-auto=validate   
spring.jpa.open-in-view=false

# Logs SQL (solo en dev; en prod desactiva TRACE)
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# === JSON / Jackson ===
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# === Flyway (migraciones en src/main/resources/db/migration) ===
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true
# spring.flyway.baseline-on-migrate=true  # descomenta si alguna vez migras BD legacy

# === Actuator (health/metrics) ===
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# === Springdoc OpenAPI / Swagger UI ===
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# === Logs (ajusta a tu gusto) ===
logging.level.com.ronaldure.restaurantmarketplace=DEBUG
logging.level.org.springframework.web=INFO

# === Errores en dev (útil para depurar) ===
server.error.include-message=always
server.error.include-binding-errors=always

# === SQL init desactivado (usamos Flyway) ===
spring.sql.init.mode=never
